global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: 'smarttalent-cluster'
    environment: 'production'

scrape_configs:
  # Prometheus self-monitoring
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Discovery Server
  - job_name: 'discovery-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['discovery-server:8761']
        labels:
          service: 'discovery-server'
          application: 'smarttalent'

  # Config Server
  - job_name: 'config-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['config-server:8888']
        labels:
          service: 'config-server'
          application: 'smarttalent'

  # Gateway Server
  - job_name: 'gateway-server'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['gateway-server:8080']
        labels:
          service: 'gateway-server'
          application: 'smarttalent'

  # Auth Service
  - job_name: 'auth-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['auth-service:8081']
        labels:
          service: 'auth-service'
          application: 'smarttalent'

  # Employee Service
  - job_name: 'employee-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['employee-service:8082']
        labels:
          service: 'employee-service'
          application: 'smarttalent'

  # Conge Service
  - job_name: 'conge-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['conge-service:8083']
        labels:
          service: 'conge-service'
          application: 'smarttalent'

  # Paie Service
  - job_name: 'paie-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['paie-service:8084']
        labels:
          service: 'paie-service'
          application: 'smarttalent'

  # Notification Service
  - job_name: 'notification-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['notification-service:8085']
        labels:
          service: 'notification-service'
          application: 'smarttalent'

  # AI Service
  - job_name: 'ai-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['ai-service:8086']
        labels:
          service: 'ai-service'
          application: 'smarttalent'

  # Recruitment Service
  - job_name: 'recruitment-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['recruitment-service:8087']
        labels:
          service: 'recruitment-service'
          application: 'smarttalent'

  # MySQL Exporter (if using mysqld_exporter)
  - job_name: 'mysql'
    static_configs:
      - targets: ['mysql-exporter:9104']
        labels:
          service: 'mysql'
          application: 'smarttalent'

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
