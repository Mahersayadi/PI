server.port=8222
spring.application.name=gateway-server

jwt.secret=${JWT_SECRET:myverysecretkey1234567890}

# Auth Service
spring.cloud.gateway.routes[0].id=auth-service
spring.cloud.gateway.routes[0].uri=lb://auth-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/api/auth/**
spring.cloud.gateway.routes[0].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[0].filters[1]=JwtAuthFilter

# Employee Service
spring.cloud.gateway.routes[1].id=employee-service
spring.cloud.gateway.routes[1].uri=lb://employee-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/api/employees/**, /api/departments/**, /api/positions/**
spring.cloud.gateway.routes[1].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[1].filters[1]=JwtAuthFilter

# Recruitment Service
spring.cloud.gateway.routes[2].id=recruitment-service
spring.cloud.gateway.routes[2].uri=lb://recruitment-service
spring.cloud.gateway.routes[2].predicates[0]=Path=/api/jobs/**, /api/applications/**
spring.cloud.gateway.routes[2].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[2].filters[1]=JwtAuthFilter

# AI Service
spring.cloud.gateway.routes[3].id=ai-service
spring.cloud.gateway.routes[3].uri=lb://ai-service
spring.cloud.gateway.routes[3].predicates[0]=Path=/api/ai/**
spring.cloud.gateway.routes[3].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[3].filters[1]=JwtAuthFilter

# Conge Service
spring.cloud.gateway.routes[4].id=conge-service
spring.cloud.gateway.routes[4].uri=lb://conge-service
spring.cloud.gateway.routes[4].predicates[0]=Path=/api/conges/**
spring.cloud.gateway.routes[4].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[4].filters[1]=JwtAuthFilter

# Paie Service
spring.cloud.gateway.routes[5].id=paie-service
spring.cloud.gateway.routes[5].uri=lb://paie-service
spring.cloud.gateway.routes[5].predicates[0]=Path=/api/paie/**
spring.cloud.gateway.routes[5].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[5].filters[1]=JwtAuthFilter

# Notification Service
spring.cloud.gateway.routes[6].id=notification-service
spring.cloud.gateway.routes[6].uri=lb://notification-service
spring.cloud.gateway.routes[6].predicates[0]=Path=/api/notifications/**
spring.cloud.gateway.routes[6].filters[0]=StripPrefix=1
spring.cloud.gateway.routes[6].filters[1]=JwtAuthFilter
