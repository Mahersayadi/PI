# SonarQube Configuration for SmartTalent RH Project

sonar.projectKey=smarttalent-rh
sonar.projectName=SmartTalent RH - Human Resources Management
sonar.projectVersion=1.0

# Source code location
sonar.sources=backend,frontend/rh-portal/src
sonar.sourceEncoding=UTF-8

# Exclusions
sonar.exclusions=**/target/**,**/node_modules/**,**/dist/**,**/*.jar,**/*.class
sonar.test.exclusions=**/target/**,**/node_modules/**

# Test coverage
sonar.coverage.jacoco.xmlReportPaths=backend/**/target/site/jacoco/jacoco.xml
sonar.junit.reportPaths=backend/**/target/surefire-reports

# Language-specific settings
sonar.java.source=17
sonar.java.binaries=backend/**/target/classes
sonar.java.test.binaries=backend/**/target/test-classes

# JavaScript/TypeScript (for Angular frontend)
sonar.typescript.lcov.reportPaths=frontend/rh-portal/coverage/lcov.info

# Quality profiles
sonar.profile=Sonar way

# Analysis parameters
sonar.scm.enabled=true
sonar.scm.provider=git

# Duplications
sonar.cpd.java.minimumTokens=50

# Size metrics
sonar.size.metric=lines

# Security
sonar.security.hotspots.enabled=true
